<!DOCTYPE html>
<html>
<head>
    <link rel="shortcut icon" href="https://awoo-co.github.io/cdn/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>catchat-videochat</title>        
</head>
<body>
    <div id="loadingOverlay" aria-live="polite" aria-label="Loading progress">
        <div class="loading-content">
            <div id="loadingLabel">Loading video chat...</div>
            <div id="loadingTrack">
                <div id="loadingBar"></div>
            </div>
            <div id="loadingPercent">0%</div>
        </div>
    </div>
   <h1>Videochat Rooms</h1>
   <p>Select a room to open your Comzy 1:1 video chat page.</p>
   <p>Use different room buttons on different devices/tabs to keep calls organized.</p>
    <div class="actions">
            <button class="action-button" id="openRoom1" type="button">Open Room 1</button>
            <button class="action-button" id="openRoom2" type="button">Open Room 2</button>
            <button class="action-button" id="openRoom3" type="button">Open Room 3</button>
            <button class="action-button secondary" id="goBack" type="button">Back</button>
    </div>
   <script src="script.js"></script>
</body>
</html>
