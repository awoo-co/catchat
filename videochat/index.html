<!DOCTYPE html>
<html>
<head>
    <link rel="shortcut icon" href="https://awoo-co.github.io/cdn/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>catchat-videochat</title>        
</head>
<body>
    <div id="loadingOverlay" aria-live="polite" aria-label="Loading progress">
        <div class="loading-content">
            <div id="loadingLabel">Loading video chat...</div>
            <div id="loadingTrack">
                <div id="loadingBar"></div>
            </div>
            <div id="loadingPercent">0%</div>
        </div>
    </div>
   <h1>info</h1>
   <p>catchat is going to videochat.</p>
   <p>Please note this weblink might be broken sometimes, if so please try again later.</p>
    <div class="actions">
         <button class="kaios-button" id="openVideochat" type="button">Open videochat</button>
         <button class="kaios-button secondary" id="goBack" type="button">Back</button>
    </div>
    <div id="softkey">
        <span id="left"></span>
        <span id="center"></span>
        <span id="right"></span>
    </div>
   <script src="script.js"></script>
</body>
</html>
