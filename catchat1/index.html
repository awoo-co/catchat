<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catchat</title>
  <script type="module" src="https://esm.run/@material/web/all.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100" />
  <link rel="stylesheet" href="style.css">
   <link rel="shortcut icon" href="https://awoo-co.github.io/cdn/favicon.ico" type="image/x-icon">
</head>
<body class="dark-mode">
  <div id="loadingOverlay" aria-live="polite" aria-label="Loading progress">
    <div class="loading-content">
      <div id="loadingLabel">Loading chat...</div>
      <div id="loadingTrack">
        <div id="loadingBar"></div>
      </div>
      <div id="loadingPercent">0%</div>
    </div>
  </div>
  <div id="app">
    <div id="connectionStatus">Connecting to chat...</div>
    <div id="modeBanner" class="mode-banner mode-cloud" aria-live="polite">Storage mode: Cloud (Puter)</div>
    <button id="reconnectButton" class="kaios-button" style="display: none;">🔄</button>
    
    <div id="chatContainer">
      <div id="messages" class="messages" tabindex="0">
        </div>

      <div id="inputContainer">
        <button id="uploadButton" class="kaios-icon-button" title="Create Puter Backup" aria-label="Create Puter Backup">💾</button>
        <button id="downloadButton" class="kaios-icon-button" title="Restore Puter Backup" aria-label="Restore Puter Backup">📥</button>
        <button id="fileUploadButton" class="kaios-icon-button" title="Upload File">📤</button>
  <input type="file" id="fileInput" style="display:none" />
        
        <input id="input" class="kaios-input" placeholder="Type your message..." type="text" />
        
        <button id="sendButton" class="kaios-icon-button" title="Send">📨</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
  <div id="softkey">
    <span id="left"></span>
    <span id="center"></span>
    <span id="right"></span>
  </div>
  <script src="script.js"></script>
</body>
</html>
