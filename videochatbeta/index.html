<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>videochat beta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingOverlay" aria-live="polite" aria-label="Loading progress">
        <div class="loading-content">
            <div id="loadingLabel">Loading video chat beta...</div>
            <div id="loadingTrack">
                <div id="loadingBar"></div>
            </div>
            <div id="loadingPercent">0%</div>
        </div>
    </div>
    <main class="app-shell">
        <h1>Videochat Beta</h1>
        <p class="subtitle">Agora SDK integration preview</p>

        <div id="status" class="status" aria-live="polite">Disconnected</div>

        <div class="controls">
            <button id="joinBtn" class="control-btn">Join Room</button>
            <button id="leaveBtn" class="control-btn secondary" disabled>Leave</button>
            <button id="toggleMicBtn" class="control-btn secondary" disabled>Mute Mic</button>
            <button id="toggleCamBtn" class="control-btn secondary" disabled>Turn Off Cam</button>
        </div>

        <section id="videoGrid" class="video-grid" aria-label="Video chat area">
            <div class="video-tile" id="localContainer">
                <div id="local-player" class="video-player"></div>
                <span class="video-label">You</span>
            </div>
            <div id="remotePlayers" class="remote-players"></div>
        </section>
    </main>

    <div id="softkey">
        <span id="left"></span>
        <span id="center"></span>
        <span id="right"></span>
    </div>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.23.2.js"></script>
    <script src="script.js"></script>
</body>
</html>
