<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>catchat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://awoo-co.github.io/cdn/favicon.ico" type="image/x-icon">
    <script type="module" src="https://esm.run/@material/web/all.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,fill,grad@20..48,100..700,0..1,-50..200" />
    
</head>
<body>
    <div id="loadingOverlay" aria-live="polite" aria-label="Loading progress">
        <div class="loading-content">
            <div id="loadingLabel">Loading website...</div>
            <div id="loadingTrack">
                <div id="loadingBar"></div>
            </div>
            <div id="loadingPercent">0%</div>
        </div>
    </div>
    <div class="container" id="app-container">
        <h1>hello! welcome to catchat</h1>
        <p>Please select a Server</p>
        
        <div class="button-group">
            <button class="app-button" id="server1">Server 1</button>
            <button class="app-button" id="server2">Server 2</button>
            <button class="app-button" id="server3">Server 3</button>
            <button class="app-button" id="videochat">📹 Video Chat</button>
            <button class="app-button danger" id="resetdata">Reset Data</button>
        </div>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
